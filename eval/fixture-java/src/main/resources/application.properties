# Billing fixture: H2 in-memory, PostgreSQL compatibility mode, DDL from schema.sql.
spring.datasource.url=jdbc:h2:mem:billing;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# The schema is the live storage layer (src/main/resources/db/schema.sql).
# Hibernate maps entities onto it and does not regenerate the DDL.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
