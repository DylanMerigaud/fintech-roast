name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rulebook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/validate_rules.py

  fixture:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval/fixture
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test

  fixture-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval/fixture-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python3 -m pytest -q

  fixture-py-clean:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval/fixture-py-clean
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest hypothesis
      - run: python3 -m pytest -q

  fixture-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eval/fixture-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - run: mvn -B test
