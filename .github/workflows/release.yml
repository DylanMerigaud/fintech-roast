name: release

# Publishes the rulebook package to npm when a version tag is pushed.
# Requires an NPM_TOKEN repository secret (a granular or automation token with
# publish rights). Tag and package.json version must match, e.g.:
#   npm version patch   # bumps package.json and creates the tag
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
