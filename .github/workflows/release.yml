name: release

# Publishes the rulebook package to npm when a version tag is pushed.
# Uses npm Trusted Publishing (OIDC): no NPM_TOKEN secret. Instead, configure this
# repo + workflow as a trusted publisher on npmjs.com once
# (package settings -> Publishing access -> Trusted Publisher: GitHub Actions,
#  repo DylanMerigaud/fintech-roast, workflow release.yml). npm then trusts the
# GitHub OIDC identity (id-token: write below) and provenance is automatic.
# Tag and package.json version must match, e.g.:
#   npm version patch   # bumps package.json and creates the tag
#   git push --follow-tags
on:
  push:
    tags:
      - "v*"

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm publish
